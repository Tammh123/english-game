<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tammh_TOL: English Master Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f7f7f7; touch-action: manipulation; }
        .btn-chunky { transition: all 0.1s ease; border-bottom-width: 4px; }
        .btn-chunky:active { transform: translateY(2px); border-bottom-width: 0px; margin-bottom: 4px; }
        .btn-primary { background-color: #58cc02; border-color: #46a302; color: white; }
        .btn-secondary { background-color: #1cb0f6; border-color: #1899d6; color: white; }
        .btn-difficulty { background-color: #ff9600; border-color: #e68a00; color: white; }
        .btn-white { background-color: white; border-color: #e5e5e5; color: #4b4b4b; }
        .btn-danger { background-color: #ff4b4b; border-color: #d33131; color: white; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .progress-fill { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-0 m-0">

    <nav id="nav-bar" class="w-full max-w-md px-6 py-4 flex items-center gap-4 hidden z-10 bg-white/80 backdrop-blur-md sticky top-0">
        <button onclick="resetGame()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-2xl"></i></button>
        <div class="flex-1 bg-gray-200 h-3 rounded-full overflow-hidden"><div id="progress-bar" class="progress-fill bg-green-500 h-full w-0"></div></div>
        <div class="flex items-center gap-1 text-orange-500 font-extrabold"><i class="fa-solid fa-bolt"></i><span id="score-display">0</span></div>
    </nav>

    <main id="app-container" class="w-full max-w-md flex-1 flex flex-col px-6 py-4 justify-center">
        </main>

    <script>
        /** * DATA ENGINE
         * Cấu trúc dữ liệu theo Lớp -> Chủ đề -> Mức độ
         */
        const gameData = {
            grades: [
                { id: 'g1', name: 'Lớp 1' }, { id: 'g2', name: 'Lớp 2' }, { id: 'g3', name: 'Lớp 3' },
                { id: 'g4', name: 'Lớp 4' }, { id: 'g5', name: 'Lớp 5' }, { id: 'g6', name: 'Lớp 6' },
                { id: 'g7', name: 'Lớp 7' }, { id: 'g8', name: 'Lớp 8' }, { id: 'g9', name: 'Lớp 9' },
                { id: 'work', name: 'Người Đi Làm' }
            ],
            topics: [
                { id: 'animals', name: 'Con vật', icon: 'fa-dog' },
                { id: 'fruits', name: 'Hoa quả', icon: 'fa-apple-whole' },
                { id: 'office', name: 'Văn phòng', icon: 'fa-briefcase' }
            ],
            levels: [
                { id: 'easy', name: 'Dễ', color: 'bg-green-400', options: 2 },
                { id: 'normal', name: 'Bình thường', color: 'bg-blue-400', options: 4 },
                { id: 'hard', name: 'Khó', color: 'bg-orange-500', options: 4 },
                { id: 'extreme', name: 'Siêu khó', color: 'bg-red-600', options: 6 }
            ],
            // Mock database mẫu (Trong thực tế có thể mở rộng mảng này)
            words: [
                { grade: 'g1', topic: 'animals', word: 'Cat', vi: 'Con mèo', img: 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400' },
                { grade: 'g1', topic: 'animals', word: 'Dog', vi: 'Con chó', img: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400' },
                { grade: 'g9', topic: 'animals', word: 'Biodiversity', vi: 'Đa dạng sinh học', img: 'https://images.unsplash.com/photo-1500829243541-74b677fecc30?w=400' },
                { grade: 'work', topic: 'office', word: 'Negotiation', vi: 'Đàm phán', img: 'https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=400' }
                // Thêm hàng trăm từ khác tại đây...
            ]
        };

        let state = {
            step: 'select-grade',
            grade: null, topic: null, level: null,
            items: [], currentIndex: 0, phase: 1, // 1: Learn, 2: Quiz, 3: Spell, 4: Context
            score: 0, correctList: [], wrongList: []
        };

        const container = document.getElementById('app-container');

        function init() { render(); }

        /** * VIEW CONTROLLERS */
        function render() {
            container.innerHTML = '';
            if (state.step === 'select-grade') renderGradeSelection();
            else if (state.step === 'select-topic') renderTopicSelection();
            else if (state.step === 'select-level') renderLevelSelection();
            else renderGame();
        }

        function renderGradeSelection() {
            let html = `<h1 class="text-2xl font-black text-center mb-8">Bạn đang học lớp mấy?</h1><div class="grid grid-cols-2 gap-3">`;
            gameData.grades.forEach(g => {
                html += `<button onclick="selectGrade('${g.id}')" class="btn-chunky btn-white py-4 rounded-2xl font-bold">${g.name}</button>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        function renderTopicSelection() {
            let html = `<h1 class="text-2xl font-black text-center mb-8">Chọn chủ đề yêu thích</h1><div class="space-y-4">`;
            gameData.topics.forEach(t => {
                html += `<button onclick="selectTopic('${t.id}')" class="w-full btn-chunky btn-secondary py-4 rounded-2xl font-bold text-lg flex items-center px-6">
                    <i class="fa-solid ${t.icon} mr-4"></i> ${t.name}</button>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        function renderLevelSelection() {
            let html = `<h1 class="text-2xl font-black text-center mb-8">Chọn thử thách</h1><div class="space-y-4">`;
            gameData.levels.forEach(l => {
                html += `<button onclick="selectLevel('${l.id}')" class="w-full btn-chunky ${l.color} text-white py-4 rounded-2xl font-black text-xl uppercase tracking-wider">
                    ${l.name}</button>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        /** * LOGIC HANDLERS */
        function selectGrade(id) { state.grade = id; state.step = 'select-topic'; render(); }
        function selectTopic(id) { state.topic = id; state.step = 'select-level'; render(); }
        
        function selectLevel(id) { 
            state.level = id; 
            state.step = 'game';
            // Lọc dữ liệu: Nếu không có từ cho lớp cụ thể, lấy từ lớp thấp hơn (để game không bị trống)
            state.items = gameData.words.filter(w => (w.grade === state.grade || w.grade === 'g1') && (state.topic === 'any' || w.topic === state.topic)).slice(0, 5);
            document.getElementById('nav-bar').classList.remove('hidden');
            render(); 
        }

        function renderGame() {
            const item = state.items[state.currentIndex];
            if (!item) { renderResults(); return; }
            
            updateProgress();
            if (state.phase === 1) renderLearn(item);
            else if (state.phase === 2) renderQuiz(item);
            else if (state.phase === 3) renderSpell(item);
            else if (state.phase === 4) renderContext(item);
        }

        function renderLearn(item) {
            container.innerHTML = `
                <div class="animate-pop text-center">
                    <h2 class="text-xl font-bold text-gray-400 mb-4 uppercase">Ghi nhớ từ mới</h2>
                    <img src="${item.img}" class="w-full h-64 object-cover rounded-3xl shadow-lg mb-6 border-4 border-white">
                    <h3 class="text-4xl font-extrabold text-blue-500 mb-2">${item.word}</h3>
                    <p class="text-2xl text-gray-500 mb-8">${item.vi}</p>
                    <button onclick="speak('${item.word}'); nextPhase();" class="w-full btn-chunky btn-primary py-4 rounded-2xl font-black text-xl">TIẾP TỤC</button>
                </div>`;
            speak(item.word);
        }

        function renderQuiz(item) {
            const levelConfig = gameData.levels.find(l => l.id === state.level);
            // Tạo options giả dựa trên độ khó
            const options = [item.word, "Apple", "Banana", "Orange", "Table", "House"].slice(0, levelConfig.options).sort(() => Math.random() - 0.5);

            container.innerHTML = `
                <div class="animate-pop">
                    <h2 class="text-xl font-bold text-gray-700 mb-6">Đây là gì?</h2>
                    <img src="${item.img}" class="w-full h-40 object-cover rounded-2xl mb-6 shadow-sm">
                    <div class="grid grid-cols-2 gap-3">
                        ${options.map(opt => `<button onclick="checkAnswer(this, '${opt}', '${item.word}')" class="btn-chunky btn-white py-4 rounded-xl font-bold border-2">${opt}</button>`).join('')}
                    </div>
                </div>`;
        }

        function renderSpell(item) {
            const word = item.word.toUpperCase();
            // Độ khó quyết định bao nhiêu chữ cái bị mất
            let hideCount = state.level === 'easy' ? 1 : (state.level === 'extreme' ? 3 : 2);
            let display = word.split('');
            let missingIndices = [];
            for(let i=0; i<hideCount; i++) {
                let idx = Math.floor(Math.random() * word.length);
                if(!missingIndices.includes(idx)) {
                    missingIndices.push(idx);
                    display[idx] = '_';
                }
            }
            const correctAnswer = word[missingIndices[0]];
            const options = [correctAnswer, 'X', 'O', 'A', 'E', 'N'].slice(0, 4).sort(() => Math.random() - 0.5);

            container.innerHTML = `
                <div class="animate-pop text-center">
                    <h2 class="text-xl font-bold text-gray-700 mb-8">Hoàn thành từ:</h2>
                    <div class="text-5xl font-black tracking-widest text-blue-600 mb-12">${display.join(' ')}</div>
                    <div class="grid grid-cols-2 gap-4">
                        ${options.map(opt => `<button onclick="checkAnswer(this, '${opt}', '${correctAnswer}')" class="btn-chunky btn-white py-4 rounded-2xl font-black text-2xl">${opt}</button>`).join('')}
                    </div>
                </div>`;
        }

        function renderContext(item) {
            const sentence = `I can see a beautiful ${item.word.toLowerCase()} over there.`;
            container.innerHTML = `
                <div class="animate-pop">
                    <h2 class="text-xl font-bold text-gray-700 mb-6">Điền vào chỗ trống:</h2>
                    <div class="bg-white p-6 rounded-2xl border-2 border-gray-100 mb-8 text-xl italic text-gray-600 leading-relaxed">
                        "${sentence.replace(item.word.toLowerCase(), '_____')}"
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                         <button onclick="checkAnswer(this, '${item.word}', '${item.word}')" class="btn-chunky btn-white py-4 rounded-xl font-bold">${item.word}</button>
                         <button onclick="checkAnswer(this, 'Something', '${item.word}')" class="btn-chunky btn-white py-4 rounded-xl font-bold">Something</button>
                    </div>
                </div>`;
        }

        /** * ENGINE HELPERS */
        function checkAnswer(btn, selected, correct) {
            if (selected.toUpperCase() === correct.toUpperCase()) {
                btn.className = "btn-chunky btn-primary py-4 rounded-xl font-bold w-full";
                state.score += 10;
                setTimeout(nextPhase, 600);
            } else {
                btn.className = "btn-chunky btn-danger py-4 rounded-xl font-bold w-full animate-shake";
                state.score = Math.max(0, state.score - 5);
                document.getElementById('score-display').innerText = state.score;
            }
        }

        function nextPhase() {
            state.phase++;
            if (state.phase > 4) {
                state.phase = 1;
                state.currentIndex++;
            }
            render();
        }

        function updateProgress() {
            const total = state.items.length * 4;
            const current = (state.currentIndex * 4) + state.phase;
            document.getElementById('progress-bar').style.width = `${(current/total)*100}%`;
            document.getElementById('score-display').innerText = state.score;
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function resetGame() { location.reload(); }

        function renderResults() {
            document.getElementById('nav-bar').classList.add('hidden');
            container.innerHTML = `
                <div class="text-center animate-pop">
                    <i class="fa-solid fa-trophy text-7xl text-yellow-400 mb-4"></i>
                    <h1 class="text-3xl font-black mb-2">Tuyệt vời!</h1>
                    <p class="text-gray-500 font-bold mb-8">Bạn đã hoàn thành bài học với <span class="text-orange-500">${state.score} XP</span></p>
                    <button onclick="resetGame()" class="w-full btn-chunky btn-secondary py-4 rounded-2xl font-black text-xl">CHƠI TIẾP</button>
                </div>`;
        }

        init();
    </script>
</body>
</html>
