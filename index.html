<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGame Lớp 2 - Bản Nâng Cấp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
        .btn-duo { transition: all 0.1s; }
        .btn-duo:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
        .difficulty-btn.active { background-color: #3b82f6; color: white; border-color: #2563eb; }
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; background-color: #f3f4f6; user-select: none; touch-action: manipulation; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; overflow-x: hidden; }
        .screen { display: none; flex: 1; flex-direction: column; padding: 1.5rem; }
        .screen.active { display: flex; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        canvas#confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
    </style>
</head>
<body class="text-gray-800 font-sans">

    <div class="app-container">
        <canvas id="confetti-canvas" class="hidden"></canvas>

        <div id="top-bar" class="hidden items-center justify-between p-4 pt-6 bg-white sticky top-0 z-10 border-b-2 border-gray-100">
            <button onclick="returnToHome()" class="text-gray-400 hover:text-gray-600 text-2xl px-2"><i class="fas fa-times"></i></button>
            <div class="flex-1 mx-4 bg-gray-200 rounded-full h-4 relative overflow-hidden">
                <div id="progress-bar" class="bg-green-500 h-full rounded-full transition-all duration-500 w-0">
                    <div class="bg-white opacity-30 h-1 w-full mt-0.5 mx-1 rounded"></div>
                </div>
            </div>
            <div class="font-bold text-orange-500 flex items-center gap-1 text-lg">
                <i class="fas fa-fire"></i> <span id="xp-counter">0</span>
            </div>
        </div>

        <div id="screen-0" class="screen active justify-start items-center text-center pt-8">
            <div class="mb-6 w-full">
                <i class="fas fa-rocket text-5xl text-blue-500 mb-3 drop-shadow-md"></i>
                <h1 class="text-3xl font-extrabold text-gray-800 mb-1">Tiếng Anh Lớp 2</h1>
                <p class="text-gray-500 font-medium text-sm">Học từ vựng siêu tốc & vui nhộn!</p>
            </div>

            <div class="w-full bg-blue-50 p-4 rounded-2xl mb-6 border-2 border-blue-100">
                <h3 class="text-sm font-bold text-blue-800 mb-3 text-left"><i class="fas fa-sliders-h mr-1"></i> Chọn Độ Khó:</h3>
                <div class="flex gap-2">
                    <button onclick="setDifficulty('easy', this)" class="difficulty-btn flex-1 py-2 rounded-xl border-2 border-gray-200 bg-white text-gray-600 font-bold text-sm">🟢 Dễ</button>
                    <button onclick="setDifficulty('normal', this)" class="difficulty-btn active flex-1 py-2 rounded-xl border-2 border-blue-600 bg-blue-500 text-white font-bold text-sm">🟡 Vừa</button>
