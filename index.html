<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tammh_TOL: English Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f7f7f7;
            touch-action: manipulation;
            user-select: none;
        }

        /* Duolingo Button Styles */
        .btn-chunky {
            transition: all 0.1s ease;
            border-bottom-width: 4px;
        }
        .btn-chunky:active {
            transform: translateY(2px);
            border-bottom-width: 0px;
            margin-bottom: 4px;
        }
        .btn-primary { background-color: #58cc02; border-color: #46a302; color: white; }
        .btn-secondary { background-color: #1cb0f6; border-color: #1899d6; color: white; }
        .btn-white { background-color: white; border-color: #e5e5e5; color: #afafaf; }
        .btn-danger { background-color: #ff4b4b; border-color: #d33131; color: white; }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }

        @keyframes bounce-in {
            0% { transform: scale(0.9); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: bounce-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Confetti Effect */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f2d74e;
            top: -10px;
            z-index: 50;
            animation: fall 3s linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        .progress-fill { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <nav id="nav-bar" class="w-full max-w-md px-6 py-4 flex items-center gap-4 hidden">
        <button onclick="confirmExit()" class="text-gray-400 hover:text-gray-600 transition">
            <i class="fa-solid fa-xmark text-2xl"></i>
        </button>
        <div class="flex-1 bg-gray-200 h-4 rounded-full overflow-hidden border-b-2 border-gray-300">
            <div id="progress-bar" class="progress-fill bg-green-500 h-full w-0"></div>
        </div>
        <div class="flex items-center gap-2 text-orange-500 font-extrabold">
            <i class="fa-solid fa-bolt"></i>
            <span id="score-display">0</span>
        </div>
    </nav>

    <main id="app-container" class="w-full max-w-md flex-1 flex flex-col px-6 py-4">
        </main>

    <script>
        /** * DATA STRUCTURE
         * Mock data for 3 Categories with at least 3 items each
         */
        const appData = {
            kids: {
                title: "Tiểu học (Lớp 1-5)",
                items: [
                    {
                        id: 1, word: "Elephant", vi: "Con voi", 
                        image: "https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?auto=format&fit=crop&w=400&q=80",
                        quizOptions: ["Elephant", "Cat", "Dog", "Mouse"],
                        spellDisplay: "E L E _ H A N T", spellAnswer: "P", spellOptions: ["P", "B", "M", "L"],
                        sentence: "The ___ has a very long trunk.", sentenceAnswer: "Elephant", sentenceOptions: ["Elephant", "Bird", "Fish", "Ant"]
                    },
                    {
                        id: 2, word: "Orange", vi: "Quả cam", 
                        image: "https://images.unsplash.com/photo-1582979512210-99b6a53386f9?auto=format&fit=crop&w=400&q=80",
                        quizOptions: ["Apple", "Orange", "Grape", "Banana"],
                        spellDisplay: "O R A N _ E", spellAnswer: "G", spellOptions: ["G", "K", "D", "P"],
                        sentence: "I like to drink ___ juice.", sentenceAnswer: "Orange", sentenceOptions: ["Orange", "Milk", "Water", "Tea"]
                    },
                    {
                        id: 3, word: "Running", vi: "Chạy bộ", 
                        image: "https://images.unsplash.com/photo-1552674605-db6ffd4facb5?auto=format&fit=crop&w=400&q=80",
                        quizOptions: ["Sleeping", "Eating", "Running", "Reading"],
                        spellDisplay: "R U N _ I N G", spellAnswer: "N", spellOptions: ["N", "M", "B", "T"],
                        sentence: "He is ___ in the park.", sentenceAnswer: "Running", sentenceOptions: ["Running", "Cooking", "Crying", "Flying"]
                    }
                ]
            },
            teens: {
                title: "Trung học (Lớp 6-12)",
                items: [
                    {
                        id: 101, word: "Environment", vi: "Môi trường", 
                        image: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=400&q=80",
                        quizOptions: ["Environment", "Pollution", "Climate", "Nature"],
                        spellDisplay: "E N V I R O N _ E N T", spellAnswer: "M", spellOptions: ["M", "N", "L", "K"],
                        sentence: "We must protect our ___.", sentenceAnswer: "Environment", sentenceOptions: ["Environment", "City", "Money", "House"]
                    },
                    {
                        id: 102, word: "Technology", vi: "Công nghệ", 
                        image: "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?auto=format&fit=crop&w=400&q=80",
                        quizOptions: ["Science", "Math", "History", "Technology"],
                        spellDisplay: "T E C H _ O L O G Y", spellAnswer: "N", spellOptions: ["N", "H", "M", "W"],
                        sentence: "Modern ___ makes life easier.", sentenceAnswer: "Technology", sentenceOptions: ["Technology", "Food", "Clothes", "Weather"]
                    },
                    {
                        id: 103, word: "Mountain", vi: "Núi", 
                        image: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=400&q=80",
                        quizOptions: ["Beach", "Forest", "Mountain", "River"],
                        spellDisplay: "M O U N T A _ N", spellAnswer: "I", spellOptions: ["I", "E", "A", "O"],
                        sentence: "Mount Everest is the highest ___.", sentenceAnswer: "Mountain", sentenceOptions: ["Mountain", "Building", "Tree", "Wave"]
                    }
                ]
            },
            adults: {
                title: "Giao tiếp & Đi làm",
                items: [
                    {
                        id: 201, word: "Report", vi: "Báo cáo", 
                        image: "https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?auto=format&fit=crop&w=400&q=80",
                        quizOptions: ["Email", "Meeting", "Invoice", "Report"],
                        spellDisplay: "R E P O R _", spellAnswer: "T", spellOptions: ["T", "D", "P", "S"],
                        sentence: "Could you send me the monthly ___?", sentenceAnswer: "Report", sentenceOptions: ["Report", "Coffee", "Desk", "Gift"]
                    },
                    {
                        id: 202, word: "Meeting", vi: "Cuộc họp", 
                        image: "https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=400&q=80",
                        quizOptions: ["Holiday", "Meeting", "Lunch", "Party"],
                        spellDisplay: "M E E T I _ G", spellAnswer: "N", spellOptions: ["N", "H", "B", "K"],
                        sentence: "The ___ starts at 9:00 AM.", sentenceAnswer: "Meeting", sentenceOptions: ["Meeting", "Movie", "Bus", "Rain"]
                    },
                    {
                        id: 203, word: "Deadline", vi: "Hạn chót", 
                        image: "https://images.unsplash.com/photo-1506784983877-45594efa4cbe?auto=format&fit=crop&w=400&q=80",
                        quizOptions: ["Deadline", "Start", "Time", "Date"],
                        spellDisplay: "D E A D L I _ E", spellAnswer: "N", spellOptions: ["N", "M", "T", "L"],
                        sentence: "We must finish before the ___.", sentenceAnswer: "Deadline", sentenceOptions: ["Deadline", "Lunch", "Weekend", "Morning"]
                    }
                ]
            }
        };

        /** * APP STATE
         */
        let state = {
            phase: 0, // 0: Selection, 1: Learn, 2: ImageQuiz, 3: Spelling, 4: Context, 5: Results
            category: null,
            items: [],
            currentIndex: 0,
            score: 0,
            correctWords: [],
            wrongWords: [],
            totalSteps: 0,
            currentStep: 0
        };

        const container = document.getElementById('app-container');
        const nav = document.getElementById('nav-bar');
        const progressBar = document.getElementById('progress-bar');
        const scoreDisplay = document.getElementById('score-display');

        // AUDIO EFFECTS (Base64)
        const sfx = {
            correct: new Audio('data:audio/wav;base64,UklGRjIAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YRAAAAAAnwCnAKcA...'), // Short chime
            wrong: new Audio('data:audio/wav;base64,UklGRjIAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YRAAAAAAnwCnAKcA...')  // Buzzer
        };

        /**
         * CORE LOGIC
         */
        function initApp() {
            renderPart0();
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function updateProgress() {
            const percent = (state.currentStep / state.totalSteps) * 100;
            progressBar.style.width = `${percent}%`;
            scoreDisplay.innerText = state.score;
        }

        function playSound(type) {
            // Simplified sound logic
            if(type === 'correct') {
                // Success feedback
            } else {
                // Fail feedback
            }
        }

        /**
         * PART 0: MODE SELECTION
         */
        function renderPart0() {
            nav.classList.add('hidden');
            container.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center text-center animate-pop">
                    <img src="https://d35aaqx5ub95lt.cloudfront.net/images/owls/769733075b927282c0e86b0a2323e433.svg" class="w-32 mb-6">
                    <h1 class="text-3xl font-extrabold text-gray-700 mb-2">Chào mừng bạn!</h1>
                    <p class="text-gray-500 mb-8 font-semibold">Chọn hành trình học tập của bạn để bắt đầu nhé</p>
                    
                    <div class="w-full space-y-4">
                        <button onclick="startGame('kids')" class="w-full btn-chunky btn-secondary py-4 rounded-2xl font-extrabold text-lg flex items-center justify-between px-6">
                            <span><i class="fa-solid fa-child mr-3"></i> Tiểu học (1-5)</span>
                            <i class="fa-solid fa-chevron-right opacity-50"></i>
                        </button>
                        <button onclick="startGame('teens')" class="w-full btn-chunky btn-secondary py-4 rounded-2xl font-extrabold text-lg flex items-center justify-between px-6">
                            <span><i class="fa-solid fa-graduation-cap mr-3"></i> Trung học (6-9)</span>
                            <i class="fa-solid fa-chevron-right opacity-50"></i>
                        </button>
                        <button onclick="startGame('adults')" class="w-full btn-chunky btn-secondary py-4 rounded-2xl font-extrabold text-lg flex items-center justify-between px-6">
                            <span><i class="fa-solid fa-briefcase mr-3"></i> Đi làm & Giao tiếp</span>
                            <i class="fa-solid fa-chevron-right opacity-50"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function startGame(catKey) {
            state.category = catKey;
            state.items = [...appData[catKey].items];
            state.score = 0;
            state.currentIndex = 0;
            state.phase = 1;
            state.currentStep = 0;
            state.totalSteps = state.items.length * 4; // Learn + 3 Quiz modes
            state.correctWords = [];
            state.wrongWords = [];
            
            nav.classList.remove('hidden');
            renderPhase();
        }

        /**
         * PHASE ROUTER
         */
        function renderPhase() {
            updateProgress();
            if (state.phase === 1) renderLearn();
            else if (state.phase === 2) renderImageQuiz();
            else if (state.phase === 3) renderSpelling();
            else if (state.phase === 4) renderContext();
            else renderResults();
        }

        /**
         * PART 1: LEARN (FLASHCARDS)
         */
        function renderLearn() {
            const item = state.items[state.currentIndex];
            container.innerHTML = `
                <div class="flex-1 flex flex-col animate-pop">
                    <h2 class="text-2xl font-black text-gray-700 mb-6">Hãy ghi nhớ từ này!</h2>
                    <div class="flex-1 flex flex-col items-center">
                        <div class="w-full h-56 rounded-3xl overflow-hidden shadow-lg border-4 border-white mb-6">
                            <img src="${item.image}" class="w-full h-full object-cover">
                        </div>
                        <button onclick="speak('${item.word}')" class="bg-blue-100 text-blue-500 p-4 rounded-full mb-4 hover:bg-blue-200 transition">
                            <i class="fa-solid fa-volume-high text-3xl"></i>
                        </button>
                        <h3 class="text-4xl font-black text-blue-600 mb-2 uppercase tracking-wide">${item.word}</h3>
                        <p class="text-2xl font-bold text-gray-400 italic">${item.vi}</p>
                    </div>
                    <button onclick="nextStep()" class="w-full btn-chunky btn-primary py-4 rounded-2xl font-extrabold text-xl mt-6 uppercase">Tiếp theo</button>
                </div>
            `;
            setTimeout(() => speak(item.word), 300);
        }

        /**
         * PART 2: IMAGE QUIZ
         */
        function renderImageQuiz() {
            const item = state.items[state.currentIndex];
            container.innerHTML = `
                <div class="flex-1 flex flex-col animate-pop" id="quiz-screen">
                    <h2 class="text-2xl font-black text-gray-700 mb-6">Nhìn hình và chọn từ đúng:</h2>
                    <div class="w-full h-48 rounded-3xl overflow-hidden shadow-md mb-8">
                        <img src="${item.image}" class="w-full h-full object-cover">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        ${item.quizOptions.map(opt => `
                            <button onclick="checkAnswer(this, '${opt}', '${item.word}')" class="btn-chunky btn-white py-4 rounded-2xl font-bold text-lg border-2">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            speak(item.word);
        }

        /**
         * PART 3: SPELLING TEST
         */
        function renderSpelling() {
            const item = state.items[state.currentIndex];
            container.innerHTML = `
                <div class="flex-1 flex flex-col animate-pop" id="quiz-screen">
                    <h2 class="text-2xl font-black text-gray-700 mb-6">Điền chữ cái còn thiếu:</h2>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border-2 border-gray-100 mb-8 text-center">
                        <h3 class="text-4xl font-black text-blue-500 tracking-widest">${item.spellDisplay}</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        ${item.spellOptions.map(opt => `
                            <button onclick="checkAnswer(this, '${opt}', '${item.spellAnswer}')" class="btn-chunky btn-white py-4 rounded-2xl font-black text-2xl">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        /**
         * PART 4: CONTEXT TEST
         */
        function renderContext() {
            const item = state.items[state.currentIndex];
            container.innerHTML = `
                <div class="flex-1 flex flex-col animate-pop" id="quiz-screen">
                    <h2 class="text-2xl font-black text-gray-700 mb-6">Chọn từ điền vào chỗ trống:</h2>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border-2 border-gray-100 mb-8 italic">
                        <p class="text-2xl text-gray-600 leading-relaxed">"${item.sentence.replace('___', '<span class="text-blue-600 font-black">___</span>')}"</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        ${item.sentenceOptions.map(opt => `
                            <button onclick="checkAnswer(this, '${opt}', '${item.sentenceAnswer}')" class="btn-chunky btn-white py-3 rounded-2xl font-bold text-lg">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        /**
         * GAME LOGIC HELPERS
         */
        function checkAnswer(btn, selected, correct) {
            const quizScreen = document.getElementById('quiz-screen');
            if (selected === correct) {
                btn.classList.remove('btn-white');
                btn.classList.add('bg-green-500', 'border-green-600', 'text-white');
                state.score += 10;
                
                // Ghi nhận từ vựng
                const currentWord = state.items[state.currentIndex].word;
                if (!state.correctWords.includes(currentWord)) state.correctWords.push(currentWord);

                setTimeout(() => nextStep(), 600);
            } else {
                quizScreen.classList.add('animate-shake');
                btn.classList.remove('btn-white');
                btn.classList.add('btn-danger');
                
                const currentWord = state.items[state.currentIndex].word;
                if (!state.wrongWords.includes(currentWord)) state.wrongWords.push(currentWord);

                setTimeout(() => {
                    quizScreen.classList.remove('animate-shake');
                }, 400);
            }
        }

        function nextStep() {
            state.currentStep++;
            state.currentIndex++;

            if (state.currentIndex >= state.items.length) {
                state.currentIndex = 0;
                state.phase++;
            }
            renderPhase();
        }

        /**
         * PART 5: RESULT SUMMARY
         */
        function renderResults() {
            nav.classList.add('hidden');
            createConfetti();
            
            container.innerHTML = `
                <div class="flex-1 flex flex-col items-center animate-pop">
                    <img src="https://d35aaqx5ub95lt.cloudfront.net/images/owls/9903901b5c879d747a750d0a77519390.svg" class="w-32 mb-4">
                    <h2 class="text-3xl font-black text-orange-500 mb-2">Hoàn thành xuất sắc!</h2>
                    <p class="text-gray-500 font-bold mb-6">Bạn đã nhận được <span class="text-orange-500">${state.score} XP</span></p>
                    
                    <div class="w-full grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-white p-4 rounded-2xl border-2 border-gray-100 text-center">
                            <p class="text-gray-400 text-sm font-bold uppercase">Chính xác</p>
                            <p class="text-2xl font-black text-green-500">${state.correctWords.length}</p>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border-2 border-gray-100 text-center">
                            <p class="text-gray-400 text-sm font-bold uppercase">Cần ôn lại</p>
                            <p class="text-2xl font-black text-red-500">${state.wrongWords.length}</p>
                        </div>
                    </div>

                    <div class="w-full flex-1 overflow-y-auto space-y-2 mb-6 max-h-48 px-2">
                        <p class="text-gray-400 font-black text-xs uppercase mb-2">Từ vựng đã học:</p>
                        ${state.correctWords.map(w => `<div class="flex items-center text-green-600 font-bold"><i class="fa-solid fa-circle-check mr-2"></i> ${w}</div>`).join('')}
                        ${state.wrongWords.map(w => `<div class="flex items-center text-red-400 font-bold"><i class="fa-solid fa-circle-exclamation mr-2"></i> ${w}</div>`).join('')}
                    </div>

                    <button onclick="location.reload()" class="w-full btn-chunky btn-secondary py-4 rounded-2xl font-extrabold text-xl uppercase">Chơi lại</button>
                </div>
            `;
        }

        function createConfetti() {
            for(let i=0; i<50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = ['#ff4b4b', '#58cc02', '#1cb0f6', '#f2d74e'][Math.floor(Math.random()*4)];
                c.style.animationDuration = (Math.random() * 2 + 1) + 's';
                c.style.opacity = Math.random();
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }
        }

        function confirmExit() {
            if(confirm("Bạn có muốn dừng trò chơi không? Tiến trình sẽ bị mất.")) {
                location.reload();
            }
        }

        // START THE APP
        initApp();
    </script>
</body>
</html>
