<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tammh_TOL: English Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #F8FAFC;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Duolingo-style Buttons */
        .btn-chunky {
            position: relative;
            transition: all 0.1s;
            border-bottom-width: 5px;
        }
        .btn-chunky:active {
            margin-top: 4px;
            border-bottom-width: 0px;
            margin-bottom: 4px;
        }

        /* Animations */
        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounce-in { animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }

        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 100;
            animation: confettiFall 3s linear forwards;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .progress-fill {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div id="app" class="w-full max-w-md min-h-screen flex flex-col relative px-4 py-6">
        </div>

    <script>
        // --- DATA STRUCTURE ---
        const appData = {
            categories: {
                kids: {
                    title: "Tiểu học (Lớp 1-5)",
                    desc: "Học từ vựng qua hình ảnh",
                    theme: "bg-green-500",
                    items: [
                        { id: 1, en: "Apple", vi: "Quả táo", type: "vocab", img: "https://images.unsplash.com/photo-1560806887-1e4cd0b6fac6?auto=format&fit=crop&w=400&q=80" },
                        { id: 2, en: "Elephant", vi: "Con voi", type: "vocab", img: "https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?auto=format&fit=crop&w=400&q=80" },
                        { id: 3, en: "School bag", vi: "Cặp sách", type: "vocab", img: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&w=400&q=80" },
                        { id: 4, en: "Blue", vi: "Màu xanh dương", type: "vocab", img: "https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=400&q=80" }
                    ]
                },
                teens: {
                    title: "Trung học (Lớp 6-12)",
                    desc: "Chủ đề môi trường & kỹ thuật",
                    theme: "bg-blue-500",
                    items: [
                        { id: 1, en: "Environment", vi: "Môi trường", type: "vocab", img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=400&q=80" },
                        { id: 2, en: "Sustainable", vi: "Bền vững", type: "vocab", img: "https://images.unsplash.com/photo-1542601906990-b4d3fb773b09?auto=format&fit=crop&w=400&q=80" },
                        { id: 3, en: "Volunteer", vi: "Tình nguyện viên", type: "vocab", img: "https://images.unsplash.com/photo-1559027615-cd2671c15f82?auto=format&fit=crop&w=400&q=80" }
                    ]
                },
                adults: {
                    title: "Giao tiếp Người đi làm",
                    desc: "Tiếng Anh công sở thực tế",
                    theme: "bg-purple-500",
                    items: [
                        { id: 1, en: "Could you please send me the report?", vi: "Bạn có thể gửi cho tôi báo cáo được không?", type: "sentence", img: "https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?auto=format&fit=crop&w=400&q=80" },
                        { id: 2, en: "Let's schedule a meeting for tomorrow.", vi: "Hãy sắp xếp một cuộc họp vào ngày mai.", type: "sentence", img: "https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=400&q=80" },
                        { id: 3, en: "I'm looking forward to working with you.", vi: "Tôi rất mong được làm việc với bạn.", type: "sentence", img: "https://images.unsplash.com/photo-1521791136364-798a7bc0d262?auto=format&fit=crop&w=400&q=80" }
                    ]
                }
            }
        };

        // --- STATE MANAGEMENT ---
        let state = {
            view: 'home',
            currentCategory: null,
            currentIndex: 0,
            score: 0,
            streak: 0,
            wrongAnswers: 0,
            isAnswering: false
        };

        const appEl = document.getElementById('app');

        // --- CORE FUNCTIONS ---

        function init() {
            renderHome();
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function triggerConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = ['#ff0', '#f0f', '#0ff', '#0f0', '#f00'][Math.floor(Math.random() * 5)];
                confetti.style.transform = `scale(${Math.random() * 0.5 + 0.5})`;
                confetti.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function renderHome() {
            state.view = 'home';
            appEl.innerHTML = `
                <div class="flex flex-col items-center mt-10 animate-bounce-in">
                    <img src="https://cdn-icons-png.flaticon.com/512/3898/3898082.png" class="w-32 h-32 mb-4" alt="Logo">
                    <h1 class="text-3xl font-extrabold text-slate-800 text-center mb-2">English Adventure</h1>
                    <p class="text-slate-500 text-center mb-8">Chọn lộ trình của bạn để bắt đầu!</p>
                    
                    ${Object.entries(appData.categories).map(([key, cat]) => `
                        <button onclick="startLevel('${key}')" class="w-full mb-4 glass p-5 rounded-2xl flex items-center gap-4 border-2 border-slate-200 hover:border-blue-400 transition-all btn-chunky border-b-[6px] active:border-b-0">
                            <div class="${cat.theme} w-14 h-14 rounded-xl flex items-center justify-center text-white text-2xl shadow-lg">
                                <i class="fas ${key === 'kids' ? 'fa-child' : key === 'teens' ? 'fa-graduation-cap' : 'fa-briefcase'}"></i>
                            </div>
                            <div class="text-left">
                                <h3 class="font-bold text-lg text-slate-800">${cat.title}</h3>
                                <p class="text-sm text-slate-500">${cat.desc}</p>
                            </div>
                        </button>
                    `).join('')}
                </div>
            `;
        }

        function startLevel(categoryKey) {
            state.view = 'learn';
            state.currentCategory = categoryKey;
            state.currentIndex = 0;
            state.score = 0;
            state.wrongAnswers = 0;
            renderGame();
        }

        function renderGame() {
            const category = appData.categories[state.currentCategory];
            const item = category.items[state.currentIndex];
            const progress = (state.currentIndex / category.items.length) * 100;

            appEl.innerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <button onclick="renderHome()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
                    <div class="flex-1 mx-4 bg-slate-200 h-3 rounded-full overflow-hidden">
                        <div class="progress-fill h-full bg-green-500" style="width: ${progress}%"></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-orange-500"><i class="fas fa-fire"></i> ${state.streak}</span>
                        <span class="font-bold text-blue-500"><i class="fas fa-star"></i> ${state.score}</span>
                    </div>
                </div>

                <div id="game-card" class="flex-1 flex flex-col animate-bounce-in">
                    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border-2 border-slate-100 flex flex-col flex-1 mb-6">
                        <div class="h-1/2 overflow-hidden bg-slate-100 relative">
                            <img src="${item.img}" class="w-full h-full object-cover" alt="visual">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                        </div>
                        
                        <div class="p-6 flex flex-col items-center justify-center flex-1 text-center">
                            <h2 class="text-4xl font-extrabold text-slate-800 mb-2">${item.en}</h2>
                            <p class="text-xl text-slate-500 mb-6 italic">${item.vi}</p>
                            
                            <button onclick="speak('${item.en}')" class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl hover:scale-110 transition-transform active:scale-95 shadow-inner">
                                <i class="fas fa-volume-up"></i>
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-3 mb-4">
                        <button onclick="checkAnswer(true)" class="w-full btn-chunky bg-green-500 border-green-700 text-white py-4 rounded-2xl font-bold text-xl shadow-lg">
                            Đã hiểu / Tiếp theo
                        </button>
                    </div>
                </div>
            `;
            
            // Auto-play TTS
            setTimeout(() => speak(item.en), 500);
        }

        function checkAnswer(isCorrect) {
            if(state.isAnswering) return;
            state.isAnswering = true;

            const card = document.getElementById('game-card');
            const category = appData.categories[state.currentCategory];

            if (isCorrect) {
                state.score += 10;
                state.streak += 1;
                card.classList.add('scale-105', 'opacity-50', 'transition-all', 'duration-300');
                
                setTimeout(() => {
                    state.currentIndex++;
                    if (state.currentIndex >= category.items.length) {
                        renderSummary();
                    } else {
                        renderGame();
                    }
                    state.isAnswering = false;
                }, 300);
            } else {
                state.streak = 0;
                state.wrongAnswers++;
                card.classList.add('shake');
                setTimeout(() => {
                    card.classList.remove('shake');
                    state.isAnswering = false;
                }, 400);
            }
        }

        function renderSummary() {
            triggerConfetti();
            const accuracy = Math.round(((appData.categories[state.currentCategory].items.length) / (appData.categories[state.currentCategory].items.length + state.wrongAnswers)) * 100);
            
            appEl.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center animate-bounce-in text-center">
                    <div class="relative mb-6">
                        <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" class="w-40 h-40" alt="Success">
                        <div class="absolute -top-2 -right-2 bg-yellow-400 text-white w-12 h-12 rounded-full flex items-center justify-center border-4 border-white font-bold">
                            <i class="fas fa-crown"></i>
                        </div>
                    </div>
                    
                    <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Tuyệt vời quá!</h1>
                    <p class="text-slate-500 mb-8">Bạn đã hoàn thành bài học hôm nay.</p>
                    
                    <div class="grid grid-cols-2 gap-4 w-full mb-10">
                        <div class="bg-white p-4 rounded-2xl shadow-md border-2 border-slate-100">
                            <p class="text-slate-400 text-sm uppercase font-bold">Tổng XP</p>
                            <p class="text-2xl font-black text-blue-500">${state.score}</p>
                        </div>
                        <div class="bg-white p-4 rounded-2xl shadow-md border-2 border-slate-100">
                            <p class="text-slate-400 text-sm uppercase font-bold">Chính xác</p>
                            <p class="text-2xl font-black text-green-500">${accuracy}%</p>
                        </div>
                    </div>
                    
                    <button onclick="renderHome()" class="w-full btn-chunky bg-blue-500 border-blue-700 text-white py-5 rounded-2xl font-bold text-xl shadow-xl uppercase tracking-wider">
                        Tiếp tục hành trình
                    </button>
                    
                    <button onclick="startLevel('${state.currentCategory}')" class="mt-4 text-slate-400 font-bold hover:text-slate-600 transition-colors">
                        <i class="fas fa-redo mr-2"></i> Học lại vòng này
                    </button>
                </div>
            `;
        }

        // Start the app
        window.onload = init;
    </script>
</body>
</html>
